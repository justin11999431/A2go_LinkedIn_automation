name: Daily Ping

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'  # Daily 8:17 AM UTC

jobs:
  status_sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run status sync
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SALESROBOT_API_KEY: ${{ secrets.SALESROBOT_API_KEY }}
          SOURCE_LEAD_SHEET_ID: ${{ secrets.SOURCE_LEAD_SHEET_ID }}
          WORKFLOW_SHEET_ID: ${{ secrets.WORKFLOW_SHEET_ID }}
        run: |
          python scripts/lead_sync.py --dry-run
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: status-sync-results
          path: reports/status_sync_*.json
