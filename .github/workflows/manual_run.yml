name: Manual Run

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        required: false
        default: 'true'
        type: boolean
      sync_leads:
        description: 'Sync leads from source sheet'
        required: false
        default: true
        type: boolean
      enroll_campaigns:
        description: 'Enroll leads in campaigns'
        required: false
        default: true
        type: boolean

jobs:
  manual_run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run preflight check
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SALESROBOT_API_KEY: ${{ secrets.SALESROBOT_API_KEY }}
          SOURCE_LEAD_SHEET_ID: ${{ secrets.SOURCE_LEAD_SHEET_ID }}
          WORKFLOW_SHEET_ID: ${{ secrets.WORKFLOW_SHEET_ID }}
        run: |
          python scripts/preflight.py
      
      - name: Sync leads
        if: github.event.inputs.sync_leads == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SALESROBOT_API_KEY: ${{ secrets.SALESROBOT_API_KEY }}
          SOURCE_LEAD_SHEET_ID: ${{ secrets.SOURCE_LEAD_SHEET_ID }}
          WORKFLOW_SHEET_ID: ${{ secrets.WORKFLOW_SHEET_ID }}
        run: |
          python scripts/lead_sync.py --dry-run=${{ github.event.inputs.dry_run }}
      
      - name: Enroll in campaigns
        if: github.event.inputs.enroll_campaigns == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SALESROBOT_API_KEY: ${{ secrets.SALESROBOT_API_KEY }}
          SOURCE_LEAD_SHEET_ID: ${{ secrets.SOURCE_LEAD_SHEET_ID }}
          WORKFLOW_SHEET_ID: ${{ secrets.WORKFLOW_SHEET_ID }}
        run: |
          python scripts/campaign_enroll.py --dry-run=${{ github.event.inputs.dry_run }}
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: manual-run-results
          path: reports/
